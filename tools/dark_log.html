<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEJSON Log — 1 records</title>
<style>
:root {
    --bg: #ffffff;
    --surface: #ffffff;
    --border: #d0d0d0;
    --text: #000000;
    --text-muted: #555555;
    --accent: #1a73e8;
    --timestamp: #555555;
    --entity: #6a1b9a;
    --field: #1565c0;
    --value: #000000;
    --separator: #e8e8e8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    font-size: 13px;
    line-height: 1.6;
}
.log-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 16px;
}
.log-header h1 { font-size: 1.1em; font-weight: 600; color: #000000; }
.log-header .meta { color: var(--text-muted); font-size: 0.85em; }
.log-entry {
    padding: 8px 0;
    border-bottom: 1px solid var(--separator);
}
.log-entry:hover { background: #f5f7ff; }
.log-entry:last-child { border-bottom: none; }
.log-line {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.log-ts { color: var(--timestamp); min-width: 140px; }
.log-entity { color: var(--entity); font-weight: 600; min-width: 80px; }
.log-idx { color: var(--text-muted); min-width: 30px; }
.log-field-row {
    margin-left: 230px;
    padding-left: 12px;
    border-left: 2px solid var(--border);
}
.log-field {
    margin: 2px 0;
    display: flex;
    gap: 8px;
}
.log-field-name { color: var(--field); min-width: 140px; }
.log-field-sep { color: var(--text-muted); }
.log-field-val {
    color: var(--value);
    word-break: break-all;
}
.log-field-val.null { color: var(--text-muted); font-style: italic; }
.log-field-val.bool-true { color: #0d8a3e; }
.log-field-val.bool-false { color: #f85149; }
.filter-bar {
    margin-bottom: 12px;
    display: flex;
    gap: 8px;
}
.filter-bar input, .filter-bar select {
    padding: 6px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85em;
}
.filter-bar input { flex: 1; }
</style>
</head>
<body>
<div class="log-header">
  <h1>BEJSON 104 Tabled Log</h1>
  <div class="meta">[2026-04-12 14:09:39] · 9 fields · 1 records · Types: Task</div>
</div>
<div class="filter-bar"><input type="text" id="logSearch" placeholder="Search log entries..." oninput="filterLog()"></div>
<div class="log-entry" data-entity="—">
  <div class="log-line">
    <span class="log-ts">[2026-04-12 14:09:39]</span>
    <span class="log-entity">—</span>
    <span class="log-idx">#0</span>
  </div>
  <div class="log-field-row"><div class="log-field"><span class="log-field-name">task_id</span><span class="log-field-sep">=</span><span class="log-field-val">T1</span></div><div class="log-field"><span class="log-field-name">title</span><span class="log-field-sep">=</span><span class="log-field-val">Test Task</span></div><div class="log-field"><span class="log-field-name">description</span><span class="log-field-sep">=</span><span class="log-field-val">A test</span></div><div class="log-field"><span class="log-field-name">status</span><span class="log-field-sep">=</span><span class="log-field-val">active</span></div><div class="log-field"><span class="log-field-name">priority</span><span class="log-field-sep">=</span><span class="log-field-val">high</span></div><div class="log-field"><span class="log-field-name">tags</span><span class="log-field-sep">=</span><span class="log-field-val">[&quot;test&quot;]</span></div><div class="log-field"><span class="log-field-name">due_date</span><span class="log-field-sep">=</span><span class="log-field-val">2026-04-12</span></div><div class="log-field"><span class="log-field-name">completed</span><span class="log-field-sep">=</span><span class="log-field-val bool-false">false</span></div><div class="log-field"><span class="log-field-name">completed_at</span><span class="log-field-sep">=</span><span class="log-field-val">None</span></div></div>
</div>
<script>
function filterLog() {
  const entity = document.getElementById('entityFilter')?.value || '';
  const query = document.getElementById('logSearch').value.toLowerCase();
  document.querySelectorAll('.log-entry').forEach(entry => {
    const e = entry.dataset.entity || '';
    const text = entry.textContent.toLowerCase();
    const matchEntity = !entity || e === entity;
    const matchQuery = !query || text.includes(query);
    entry.style.display = (matchEntity && matchQuery) ? '' : 'none';
  });
}
</script>
</body>
</html>
